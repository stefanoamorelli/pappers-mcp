name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  changelog:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      body: ${{ steps.extract.outputs.body }}
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for tag
        id: extract
        run: |
          # Strip leading "v" to match "## v1.2.3" headers
          version="${GITHUB_REF_NAME#v}"
          # Extract the section between this version's header and the next "## " header (or EOF)
          body=$(awk -v ver="$version" '
            BEGIN { found=0 }
            /^## / {
              if (found) exit
              if (index($0, ver)) { found=1; next }
            }
            found { print }
          ' CHANGELOG.md)
          # Write to output using heredoc delimiter
          {
            echo "body<<CHANGELOG_EOF"
            echo "$body"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: changelog
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      matrix:
        goos: [linux, darwin, windows]
        goarch: [amd64, arm64]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -o pappers-mcp-${GOOS}-${GOARCH}${ext} ./cmd/pappers-mcp

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ needs.changelog.outputs.body }}
          files: pappers-mcp-*

  notify-proxy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Request Go module proxy to fetch the new version
        run: |
          GOPROXY=https://proxy.golang.org \
          go install github.com/stefanoamorelli/pappers-mcp/cmd/pappers-mcp@${GITHUB_REF_NAME}
